name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: forge build
        run: forge build --sizes
      - name: forge test
        run: forge test -vvv
      - name: forge fmt --check
        run: forge fmt --check
